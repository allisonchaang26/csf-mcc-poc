services:
  - type: web
    name: csf-mcc-poc
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false   # set this manually in the Render dashboard to enable Claude
    plan: free
